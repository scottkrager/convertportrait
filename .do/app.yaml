name: convertportrait
region: nyc
domains:
  - domain: convertportrait.com
    type: PRIMARY
  - domain: www.convertportrait.com
    type: ALIAS
services:
  - name: web
    github:
      repo: scottkrager/convertportrait
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    envs:
      - key: APP_NAME
        value: ConvertPortrait
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://convertportrait.com
      - key: APP_KEY
        type: SECRET
        value: "base64:9X0euTxeQwbUshcQST9IKwtiYizi4O3OSP3H7qisOtA="
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: array
      - key: LOG_CHANNEL
        value: stderr
databases:
  - name: db
    engine: PG
    production: false
