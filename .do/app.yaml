name: convertportrait
region: nyc
services:
  - name: web
    github:
      repo: scottkrager/convertportrait
      branch: main
      deploy_on_push: true
    build_command: |
      composer install --no-dev --optimize-autoloader
      npm ci
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    run_command: |
      php artisan migrate --force
      apache2-foreground
    environment_slug: php
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    envs:
      - key: APP_NAME
        value: ConvertPortrait
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://convertportrait.com
      - key: APP_KEY
        type: SECRET
        value: EV[APP_KEY]
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
